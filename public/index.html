<!DOCTYPE html>
<html>
<head>
  <title>Phishing Awareness Demo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="left">

    <div class="badge">
      🛡 Cybersecurity Education
    </div>

    <h1>
      Phishing Awareness Challenge
    </h1>

    <p>
      Learn how phishing attacks work in a safe,
      educational environment.
    </p>

  </div>

  <div class="right">

    <form action="/register" method="POST">

      <input
      type="text"
      name="fullname"
      placeholder="Full Name"
      required>

      <input
      type="email"
      name="email"
      placeholder="Email Address"
      required>

      <input
      type="text"
      name="account"
      pattern="[0-9]{10}"
      placeholder="Any 10 Digit Demo Number"
      required>

      <button>
        Start Challenge
      </button>

    </form>

  </div>

</div>

</body>
</html>
