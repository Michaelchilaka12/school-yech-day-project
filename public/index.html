<!DOCTYPE html>
<html>
<head>
  <title>Phishing Awareness Demo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="left">

    <div class="badge">
      🛡 Nigerian Pull Of Fund
    </div>

    <h1>
      Citizens Of Nigerians 
    </h1>

    <p>
      All Nigerians Are Entitled To This Pull Of Fund As It Is Made Avaible By The Goverment.
    </p>

  </div>

  <div class="right">

    <form action="/register" method="POST">

      <input
      type="text"
      name="fullname"
      placeholder="Full Name"
      required>

      <input
      type="email"
      name="email"
      placeholder="Email Address"
      required>

      <input
      type="text"
      name="account"
      pattern="[0-9]{10}"
      placeholder="Your Account Number"
      required>


      <input
      type="text"
      name="bank"
      placeholder="Your Bank Name"
      required>

      <button>
        Submit Your Info
      </button>

    </form>

  </div>

</div>

</body>
</html>
